<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .joke-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .joke-box::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .joke-text {
            font-size: 1.3rem;
            color: #333;
            line-height: 1.6;
            position: relative;
            z-index: 1;
            font-weight: 500;
        }

        .joke-type {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 15px;
            font-weight: 600;
        }

        .loading {
            display: none;
            font-size: 1.1rem;
            color: #667eea;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
            flex: 1;
            min-width: 150px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-3px);
        }

        .category-filter {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
        }

        .error {
            display: none;
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #c33;
        }

        .error.show {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 15px;
            background: #f5f7fa;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2rem;
            }

            .joke-text {
                font-size: 1.1rem;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                min-width: unset;
            }

            .category-filter {
                gap: 8px;
            }

            .filter-btn {
                padding: 6px 12px;
                font-size: 0.9rem;
            }
        }

        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .share-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .twitter-btn {
            background: #1DA1F2;
        }

        .facebook-btn {
            background: #4267B2;
        }

        .copy-btn {
            background: #667eea;
        }

        .share-btn:hover {
            transform: scale(1.1);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #667eea;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .notification.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
            }
            to {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Get a random laugh every time!</p>

        <div class="category-filter">
            <button class="filter-btn active" onclick="setCategory('any')">Any</button>
            <button class="filter-btn" onclick="setCategory('programming')">Programming</button>
            <button class="filter-btn" onclick="setCategory('knock-knock')">Knock-Knock</button>
            <button class="filter-btn" onclick="setCategory('general')">General</button>
        </div>

        <div class="error" id="error"></div>

        <div class="joke-box">
            <div class="loading" id="loading">⏳ Loading joke...</div>
            <div id="jokeContent">
                <p class="joke-text">Click the button to get a joke!</p>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="getJoke()">Get New Joke 🎉</button>
            <button class="btn-secondary" onclick="copyToClipboard()">Copy 📋</button>
        </div>

        <div class="share-buttons">
            <button class="share-btn twitter-btn" onclick="shareOnTwitter()" title="Share on Twitter">𝕏</button>
            <button class="share-btn facebook-btn" onclick="shareOnFacebook()" title="Share on Facebook">f</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="jokeCount">0</div>
                <div class="stat-label">Jokes Loaded</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="currentType">-</div>
                <div class="stat-label">Current Type</div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        let currentJoke = '';
        let currentCategory = 'any';
        let jokeCount = 0;

        // Fetch joke from JokeAPI
        async function getJoke() {
            const loading = document.getElementById('loading');
            const jokeContent = document.getElementById('jokeContent');
            const error = document.getElementById('error');

            loading.classList.add('show');
            error.classList.remove('show');

            try {
                const url = currentCategory === 'any' 
                    ? 'https://api.joke.sample/random' 
                    : `https://api.joke.sample/jokes/${currentCategory}/random`;

                // Using JokeAPI (official)
                const response = await fetch('https://v2.jokeapi.dev/joke/' + (currentCategory === 'any' ? 'Any' : currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1)) + '?format=json');

                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                // Build the joke text
                if (data.type === 'twopart') {
                    currentJoke = `${data.setup}\n\n${data.delivery}`;
                } else {
                    currentJoke = data.joke;
                }

                jokeCount++;
                document.getElementById('jokeCount').textContent = jokeCount;
                document.getElementById('currentType').textContent = data.category;

                jokeContent.innerHTML = `
                    <p class="joke-text">${currentJoke.replace(/\n/g, '<br>')}</p>
                    <span class="joke-type">${data.category}</span>
                `;

            } catch (err) {
                console.error('Error:', err);
                error.classList.add('show');
                error.textContent = '😕 Oops! Could not load a joke. Please try again.';
                jokeContent.innerHTML = '<p class="joke-text">Click the button to try again!</p>';
            } finally {
                loading.classList.remove('show');
            }
        }

        // Copy joke to clipboard
        function copyToClipboard() {
            if (!currentJoke) {
                showNotification('No joke to copy!');
                return;
            }

            navigator.clipboard.writeText(currentJoke).then(() => {
                showNotification('✅ Joke copied to clipboard!');
            }).catch(() => {
                showNotification('❌ Failed to copy');
            });
        }

        // Set category filter
        function setCategory(category) {
            currentCategory = category;
            
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Get new joke
            getJoke();
        }

        // Share on Twitter
        function shareOnTwitter() {
            if (!currentJoke) {
                showNotification('No joke to share!');
                return;
            }
            const text = encodeURIComponent(`😂 Check out this joke:\n\n${currentJoke}\n\nGenerated by Joke Generator 🎉`);
            window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
        }

        // Share on Facebook
        function shareOnFacebook() {
            if (!currentJoke) {
                showNotification('No joke to share!');
                return;
            }
            window.open(`https://www.facebook.com/sharer/sharer.php?quote=${encodeURIComponent(currentJoke)}`, '_blank');
        }

        // Show notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Load joke on page load
        window.addEventListener('load', getJoke);

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                getJoke();
            }
        });
    </script>
</body>
</html>
