<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Form - VOLT Electronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface2: #1e1e1e;
            --border: rgba(255,255,255,0.07);
            --accent: #e8ff47;
            --accent2: #47d4ff;
            --text: #f0f0f0;
            --muted: #888;
            --font-display: 'Bebas Neue', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        /* NAV */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2.5rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 2rem;
            letter-spacing: 0.12em;
            color: var(--accent);
        }

        .logo span { color: var(--text); }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }

        /* FORM CONTAINER */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            color: var(--text);
            margin-bottom: 10px;
        }

        .form-header p {
            color: var(--muted);
            font-size: 14px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.3rem;
            color: var(--accent);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        label .required {
            color: #ff4747;
        }

        input, textarea, select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 15px;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 14px;
            transition: all 0.2s;
            resize: vertical;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: #252525;
            box-shadow: 0 0 0 3px rgba(232, 255, 71, 0.1);
        }

        input::placeholder {
            color: var(--muted);
        }

        .products-list {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .product-item {
            padding: 10px;
            margin-bottom: 10px;
            background: var(--surface);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-item input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .product-item label {
            margin: 0;
            flex: 1;
            cursor: pointer;
        }

        .product-item input[type="number"] {
            width: 70px;
            padding: 6px;
        }

        .cart-summary {
            background: linear-gradient(135deg, rgba(232, 255, 71, 0.1), rgba(71, 212, 255, 0.1));
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .summary-total {
            border-top: 1px solid var(--border);
            padding-top: 10px;
            margin-top: 10px;
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
        }

        textarea {
            min-height: 100px;
            font-family: var(--font-body);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 30px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-body);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--accent), #d4ff47);
            color: #000;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(232, 255, 71, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-reset:hover {
            background: var(--surface);
        }

        .success-message {
            display: none;
            background: rgba(71, 255, 120, 0.1);
            border: 1px solid rgba(71, 255, 120, 0.5);
            color: #47ff78;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message {
            display: none;
            background: rgba(255, 71, 71, 0.1);
            border: 1px solid rgba(255, 71, 71, 0.5);
            color: #ff4747;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 20px;
                padding: 1rem;
            }

            .container {
                padding: 25px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .form-header h1 {
                font-size: 2rem;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
                gap: 15px;
            }
        }

        .loading {
            display: none;
        }

        .loading.show {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">VOLT<span>.</span></div>
    <div class="nav-links">
        <a href="index.html">Shop</a>
        <a href="order-form.html" class="active">Order</a>
        <a href="joke-generator.html">Fun</a>
    </div>
</nav>

<div class="container">
    <div class="form-header">
        <h1>Place Your Order</h1>
        <p>Fill in the form below to complete your purchase</p>
    </div>

    <div class="success-message" id="successMessage">
        ✅ Order submitted successfully! We'll contact you soon.
    </div>

    <div class="error-message" id="errorMessage"></div>

    <form id="orderForm" action="https://formspree.io/f/xpwazqwq" method="POST">

        <!-- PERSONAL INFORMATION -->
        <div class="form-section">
            <h2 class="section-title">👤 Personal Information</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="fullname">Full Name <span class="required">*</span></label>
                    <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required>
                </div>
                <div class="form-group">
                    <label for="whatsapp">WhatsApp Number (Optional)</label>
                    <input type="tel" id="whatsapp" name="whatsapp" placeholder="+1 (555) 123-4567">
                </div>
            </div>
        </div>

        <!-- ADDRESS INFORMATION -->
        <div class="form-section">
            <h2 class="section-title">🏠 Delivery Address</h2>
            
            <div class="form-row full">
                <div class="form-group">
                    <label for="address">Street Address <span class="required">*</span></label>
                    <input type="text" id="address" name="address" placeholder="123 Main Street" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="city">City <span class="required">*</span></label>
                    <input type="text" id="city" name="city" placeholder="New York" required>
                </div>
                <div class="form-group">
                    <label for="state">State/Province <span class="required">*</span></label>
                    <input type="text" id="state" name="state" placeholder="NY" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="zip">Zip/Postal Code <span class="required">*</span></label>
                    <input type="text" id="zip" name="zip" placeholder="10001" required>
                </div>
                <div class="form-group">
                    <label for="country">Country <span class="required">*</span></label>
                    <input type="text" id="country" name="country" placeholder="United States" required>
                </div>
            </div>
        </div>

        <!-- PRODUCTS SELECTION -->
        <div class="form-section">
            <h2 class="section-title">🛍️ Select Products</h2>
            
            <div class="products-list">
                <!-- CHARGERS -->
                <div class="product-item">
                    <input type="checkbox" id="prod1" name="products" value="HyperCharge 140W ($89)">
                    <label for="prod1">HyperCharge 140W GaN Pro - $89</label>
                    <input type="number" name="qty_prod1" min="0" max="10" value="0" class="qty-input">
                </div>

                <div class="product-item">
                    <input type="checkbox" id="prod2" name="products" value="MagSafe Pad ($45)">
                    <label for="prod2">MagSafe Wireless Pad 15W - $45</label>
                    <input type="number" name="qty_prod2" min="0" max="10" value="0" class="qty-input">
                </div>

                <div class="product-item">
                    <input type="checkbox" id="prod3" name="products" value="PowerBank Elite ($55)">
                    <label for="prod3">PowerBank Elite 20000mAh - $55</label>
                    <input type="number" name="qty_prod3" min="0" max="10" value="0" class="qty-input">
                </div>

                <!-- HEADPHONES -->
                <div class="product-item">
                    <input type="checkbox" id="prod4" name="products" value="SoundMax ANC ($249)">
                    <label for="prod4">SoundMax ANC Pro X - $249</label>
                    <input type="number" name="qty_prod4" min="0" max="10" value="0" class="qty-input">
                </div>

                <div class="product-item">
                    <input type="checkbox" id="prod5" name="products" value="BudsAir TWS ($129)">
                    <label for="prod5">BudsAir True Wireless - $129</label>
                    <input type="number" name="qty_prod5" min="0" max="10" value="0" class="qty-input">
                </div>

                <div class="product-item">
                    <input type="checkbox" id="prod6" name="products" value="StudioPro HD ($159)">
                    <label for="prod6">StudioPro Over-Ear HD - $159</label>
                    <input type="number" name="qty_prod6" min="0" max="10" value="0" class="qty-input">
                </div>

                <!-- SPEAKERS -->
                <div class="product-item">
                    <input type="checkbox" id="prod7" name="products" value="BoomBox Ultra ($179)">
                    <label for="prod7">BoomBox Ultra 360° - $179</label>
                    <input type="number" name="qty_prod7" min="0" max="10" value="0" class="qty-input">
                </div>

                <div class="product-item">
                    <input type="checkbox" id="prod8" name="products" value="MiniPod Speaker ($69)">
                    <label for="prod8">MiniPod Pocket Speaker - $69</label>
                    <input type="number" name="qty_prod8" min="0" max="10" value="0" class="qty-input">
                </div>

                <div class="product-item">
                    <input type="checkbox" id="prod9" name="products" value="StereoBar ($149)">
                    <label for="prod9">StereoBar Home Speaker - $149</label>
                    <input type="number" name="qty_prod9" min="0" max="10" value="0" class="qty-input">
                </div>

                <!-- WATCHES -->
                <div class="product-item">
                    <input type="checkbox" id="prod10" name="products" value="PulseOS Ultra ($299)">
                    <label for="prod10">PulseOS Watch Ultra S3 - $299</label>
                    <input type="number" name="qty_prod10" min="0" max="10" value="0" class="qty-input">
                </div>

                <div class="product-item">
                    <input type="checkbox" id="prod11" name="products" value="FitRound Sport ($199)">
                    <label for="prod11">FitRound Sport Edition - $199</label>
                    <input type="number" name="qty_prod11" min="0" max="10" value="0" class="qty-input">
                </div>

                <div class="product-item">
                    <input type="checkbox" id="prod12" name="products" value="VitaTrack Watch ($255)">
                    <label for="prod12">VitaTrack Health Watch - $255</label>
                    <input type="number" name="qty_prod12" min="0" max="10" value="0" class="qty-input">
                </div>
            </div>
        </div>

        <!-- DELIVERY & PAYMENT -->
        <div class="form-section">
            <h2 class="section-title">📦 Delivery & Payment</h2>
            
            <div class="form-row full">
                <div class="form-group">
                    <label for="delivery">Delivery Method <span class="required">*</span></label>
                    <select id="delivery" name="delivery" required>
                        <option value="">Select Delivery Method</option>
                        <option value="Standard Shipping - 5-7 days">Standard Shipping - 5-7 days</option>
                        <option value="Express Shipping - 2-3 days">Express Shipping - 2-3 days</option>
                        <option value="Overnight Delivery">Overnight Delivery</option>
                        <option value="Pickup at Store">Pickup at Store</option>
                    </select>
                </div>
            </div>

            <div class="form-row full">
                <div class="form-group">
                    <label for="payment">Payment Method <span class="required">*</span></label>
                    <select id="payment" name="payment" required>
                        <option value="">Select Payment Method</option>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Debit Card">Debit Card</option>
                        <option value="PayPal">PayPal</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                        <option value="Cash on Delivery">Cash on Delivery</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- NOTES -->
        <div class="form-section">
            <h2 class="section-title">📝 Additional Notes</h2>
            
            <div class="form-row full">
                <div class="form-group">
                    <label for="notes">Order Notes (Optional)</label>
                    <textarea id="notes" name="notes" placeholder="Any special requests or instructions?"></textarea>
                </div>
            </div>
        </div>

        <!-- BUTTONS -->
        <div class="button-group">
            <button type="submit" class="btn-submit">
                <span class="loading" id="loading">⏳</span>
                Complete Order
            </button>
            <button type="reset" class="btn-reset">Clear Form</button>
        </div>
    </form>
</div>

<script>
    const form = document.getElementById('orderForm');
    const successMsg = document.getElementById('successMessage');
    const errorMsg = document.getElementById('errorMessage');
    const loading = document.getElementById('loading');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Show loading
        loading.classList.add('show');

        // Validate that at least one product is selected
        const products = document.querySelectorAll('input[name="products"]:checked');
        if (products.length === 0) {
            errorMsg.textContent = '❌ Please select at least one product!';
            errorMsg.classList.add('show');
            loading.classList.remove('show');
            return;
        }

        errorMsg.classList.remove('show');

        try {
            // Submit form using Formspree
            const formData = new FormData(form);
            
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (response.ok) {
                successMsg.classList.add('show');
                form.reset();
                
                // Scroll to success message
                successMsg.scrollIntoView({ behavior: 'smooth' });

                // Hide success message after 5 seconds
                setTimeout(() => {
                    successMsg.classList.remove('show');
                }, 5000);
            } else {
                errorMsg.textContent = '❌ Error submitting form. Please try again.';
                errorMsg.classList.add('show');
            }
        } catch (error) {
            console.error('Error:', error);
            errorMsg.textContent = '❌ Error submitting form. Please try again.';
            errorMsg.classList.add('show');
        } finally {
            loading.classList.remove('show');
        }
    });

    // Update delivery method based on selection
    document.getElementById('delivery').addEventListener('change', function() {
        console.log('Delivery method:', this.value);
    });
</script>

</body>
</html>
